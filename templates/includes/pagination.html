{% load querystring_tags %}
{% if is_paginated %}
<div class="panel-card card mt-3">
    <div class="card-body py-3">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
            <p class="mb-0 text-secondary small">
                Página {{ page_obj.number }} de {{ paginator.num_pages }}
            </p>
            <div class="d-flex flex-wrap justify-content-center gap-2">
                {% if page_obj.has_previous %}
                    <a class="btn btn-sm btn-outline-secondary" href="{% replace_query page=1 %}">Primera</a>
                    <a class="btn btn-sm btn-outline-secondary" href="{% replace_query page=page_obj.previous_page_number %}">Anterior</a>
                {% endif %}
                <span class="btn btn-sm btn-primary disabled">Página {{ page_obj.number }}</span>
                {% if page_obj.has_next %}
                    <a class="btn btn-sm btn-outline-secondary" href="{% replace_query page=page_obj.next_page_number %}">Siguiente</a>
                    <a class="btn btn-sm btn-outline-secondary" href="{% replace_query page=paginator.num_pages %}">Última</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endif %}
