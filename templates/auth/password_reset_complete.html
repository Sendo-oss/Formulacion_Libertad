{% extends "base.html" %}

{% block title %}Contraseña actualizada{% endblock %}

{% block content %}
<div class="panel-card card mx-auto" style="max-width: 720px;">
    <div class="card-body p-4 p-lg-5">
        <span class="badge badge-soft rounded-pill mb-3">Proceso completado</span>
        <h1 class="section-title mb-2">Contraseña actualizada</h1>
        <p class="text-secondary mb-4">
            Tu contraseña fue restablecida correctamente. Ya puedes ingresar al sistema con la nueva clave.
        </p>
        <a class="btn btn-primary" href="{% url 'login' %}">Ir al ingreso</a>
    </div>
</div>
{% endblock %}
