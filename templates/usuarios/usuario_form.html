{% extends "base.html" %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="h3">{% if object %}Editar usuario{% else %}Nuevo usuario{% endif %}</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit">Guardar</button>
        </form>
    </div>
</div>
{% endblock %}
