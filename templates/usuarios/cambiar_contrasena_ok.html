{% extends "base.html" %}

{% block title %}Contrasena actualizada{% endblock %}

{% block content %}
<div class="panel-card card mx-auto" style="max-width: 720px;">
    <div class="card-body p-4 p-lg-5">
        <span class="badge badge-soft rounded-pill mb-3">Proceso completado</span>
        <h1 class="section-title mb-2">Contrasena actualizada</h1>
        <p class="text-secondary mb-4">
            Tu nueva contrasena fue guardada correctamente. Desde ahora podras ingresar y usar la plataforma con esa contrasena personal.
        </p>
        <a class="btn btn-primary" href="{% url 'dashboard:inicio' %}">Ir al sistema</a>
    </div>
</div>
{% endblock %}
